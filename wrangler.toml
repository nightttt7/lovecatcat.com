name = "lovecatcat"
main = "src/worker.ts"
compatibility_date = "2026-02-01"
routes = [
	{ pattern = "lovecatcat.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "lovecatcat-prod"
database_id = "aebaaa10-b2e7-4f1f-9dc1-70edbea8c523"

[ai]
binding = "AI"

[[queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "lovecatcat-post-translation"

[[queues.consumers]]
queue = "lovecatcat-post-translation"
max_batch_size = 4
max_batch_timeout = 5
max_retries = 3

[env.preview]
workers_dev = true
preview_urls = false
routes = []

[env.preview.ai]
binding = "AI"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "lovecatcat-preview"
database_id = "ac29b946-6fb8-406f-af7b-b07b82d05ca6"

[[env.preview.queues.producers]]
binding = "TRANSLATION_QUEUE"
queue = "lovecatcat-preview-post-translation"

[[env.preview.queues.consumers]]
queue = "lovecatcat-preview-post-translation"
max_batch_size = 4
max_batch_timeout = 5
max_retries = 3

